<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוח פיננסי חי: MSFT ושער הדולר</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .card h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .price {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .currency {
            font-size: 1rem;
            color: var(--text-muted);
            margin-right: 5px;
        }

        .status {
            font-size: 0.85rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .update-time {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .loading {
            font-size: 1.5rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>דוח פיננסי מעודכן</h1>

    <div class="dashboard">
        <div class="card">
            <h2>מניית מיקרוסופט (MSFT)</h2>
            <div class="price" id="msft-price"><span class="loading">טוען...</span></div>
            <div class="status">מתעדכן חי מ-Yahoo Finance</div>
        </div>

        <div class="card">
            <h2>שער הדולר (USD/ILS)</h2>
            <div class="price" id="usd-ils-price"><span class="loading">טוען...</span></div>
            <div class="status">מתעדכן חי מ-Exchangerate.host</div>
        </div>
    </div>

    <div class="update-time" id="update-time">
        עדכון אחרון: טוען נתונים...
    </div>
</div>

<script>
    // פונקציה להבאת מחיר מניית מיקרוסופט (משתמש ב-scraped data מ-Yahoo כיוון שאין API חינמי לחלוטין ללא מפתח)
    async function fetchMSFT() {
        try {
            // שימוש בשרת פרוקסי כדי לעקוף חסימות CORS בדפדפן
            const response = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/MSFT');
            const data = await response.json();
            const price = data.chart.result[0].meta.regularMarketPrice;
            document.getElementById('msft-price').innerHTML = `$${price.toFixed(2)}`;
        } catch (error) {
            console.error("Error fetching MSFT:", error);
            document.getElementById('msft-price').innerText = "שגיאה בטעינה";
        }
    }

    // פונקציה להבאת שער הדולר לשקל
    async function fetchForex() {
        try {
            const response = await fetch('https://api.exchangerate.host/live?access_key=FREE&symbols=ILS');
            // אם ה-API החינמי הספציפי למעלה נחסם/מוגבל, הנה אלטרנטיבה פתוחה מעולה:
            const altResponse = await fetch('https://open.er-api.com/v6/latest/USD');
            const altData = await altResponse.json();
            
            const rate = altData.rates.ILS;
            document.getElementById('usd-ils-price').innerHTML = `₪${rate.toFixed(3)}`;
        } catch (error) {
            console.error("Error fetching Forex:", error);
            document.getElementById('usd-ils-price').innerText = "שגיאה בטעינה";
        }
    }

    function updateTimestamp() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('he-IL');
        document.getElementById('update-time').innerText = `עדכון אחרון: ${timeString}`;
    }

    async function refreshData() {
        await Promise.all([fetchMSFT(), fetchForex()]);
        updateTimestamp();
    }

    // טעינה ראשונית
    refreshData();

    // רענון כל 60 שניות (60000 מילישניות)
    setInterval(refreshData, 60000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tech Dashboard</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --text: #c9d1d9; --success: #3fb950; --danger: #f85149; --border: #30363d;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: var(--card); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h1 { font-size: 1.3rem; color: var(--accent); margin: 0; }
        .market-status { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: #21262d; border: 1px solid var(--border); }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 5px; }

        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid var(--border); transition: background 0.4s; }
        .label { font-size: 0.9rem; font-weight: 500; }
        .value-container { display: flex; flex-direction: column; align-items: flex-end; }
        .price { font-size: 1.25rem; font-weight: 800; font-family: monospace; }
        .percent { font-size: 0.8rem; font-weight: bold; margin-top: 2px; }

        /* מחשבון המרה */
        .converter { margin-top: 20px; padding: 15px; background: #0d1117; border-radius: 12px; border: 1px solid var(--border); }
        .converter-title { font-size: 0.85rem; color: var(--accent); margin-bottom: 10px; text-align: center; font-weight: bold; }
        .input-group { display: flex; gap: 10px; align-items: center; justify-content: center; }
        input { background: #161b22; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 80px; text-align: center; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--accent); }
        .conv-label { font-size: 0.9rem; color: #8b949e; }

        .up { color: var(--success); } .down { color: var(--danger); }
        .flash-up { background-color: rgba(63, 185, 80, 0.1) !important; }
        .flash-down { background-color: rgba(248, 81, 73, 0.1) !important; }

        .controls { margin-top: 25px; text-align: center; }
        button { background: var(--accent); color: #0d1117; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        .footer { font-size: 0.7rem; text-align: center; margin-top: 15px; color: #484f58; }
        @keyframes spin { 100% { transform: rotate(-360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>דוח טכנולוגיה</h1>
        <div class="market-status" id="market-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">בודק שוק...</span>
        </div>
    </div>
    
    <div id="stocks-list"></div>

    <div class="data-row">
        <span class="label">שער הדולר (USD/ILS)</span>
        <div class="value-container">
            <span class="price" id="usd-ils">--.--</span>
        </div>
    </div>

    <div class="converter">
        <div class="converter-title">מחשבון המרה מהיר</div>
        <div class="input-group">
            <input type="number" id="usd-input" placeholder="USD" oninput="convert('usd')">
            <span class="conv-label">$ =</span>
            <input type="number" id="ils-input" placeholder="ILS" oninput="convert('ils')">
            <span class="conv-label">₪</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="updateDashboard()">
            <span id="refresh-icon">🔄</span> עדכן הכל
        </button>
    </div>

    <div class="footer" id="last-update">טוען נתונים...</div>
</div>

<script>
    const FINNHUB_KEY = 'd70khe9r01ql6rnvkon0d70khe9r01ql6rnvkong';
    const symbols = { 'MSFT': 'Microsoft', 'GOOGL': 'Google', 'META': 'Meta' };
    let currentRate = 0;

    // יצירת שורות המניות
    const list = document.getElementById('stocks-list');
    Object.keys(symbols).forEach(s => {
        list.innerHTML += `
            <div class="data-row" id="row-${s}">
                <span class="label">${symbols[s]}</span>
                <div class="value-container">
                    <span class="price" id="price-${s}">--.--</span>
                    <span class="percent" id="perc-${s}">0.00%</span>
                </div>
            </div>`;
    });

    function checkMarketStatus() {
        const now = new Date();
        const nycTime = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: 'numeric', hour12: false }).format(now);
        const [hour, minute] = nycTime.split(':').map(Number);
        const day = now.getDay(); // 0 = Sunday, 6 = Saturday

        const isOpen = (day >= 1 && day <= 5) && (hour > 9 || (hour === 9 && minute >= 30)) && (hour < 16);
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        dot.style.background = isOpen ? 'var(--success)' : '#8b949e';
        text.innerText = isOpen ? 'שוק פתוח (NYC)' : 'שוק סגור';
    }

    function convert(source) {
        const usdIn = document.getElementById('usd-input');
        const ilsIn = document.getElementById('ils-input');
        if (!currentRate) return;

        if (source === 'usd') {
            ilsIn.value = (usdIn.value * currentRate).toFixed(2);
        } else {
            usdIn.value = (ilsIn.value / currentRate).toFixed(2);
        }
    }

    async function updateDashboard() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('spinning');
        checkMarketStatus();

        try {
            // עדכון מניות
            for (let s of Object.keys(symbols)) {
                const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`);
                const data = await res.json();
                if (data.c) {
                    const priceElem = document.getElementById(`price-${s}`);
                    const percElem = document.getElementById(`perc-${s}`);
                    const row = document.getElementById(`row-${s}`);
                    const changePercent = ((data.c - data.pc) / data.pc * 100).toFixed(2);
                    const isUp = changePercent >= 0;

                    priceElem.innerText = `$${data.c.toFixed(2)}`;
                    percElem.innerText = `${isUp ? '▲' : '▼'} ${isUp ? '+' : ''}${changePercent}%`;
                    percElem.className = `percent ${isUp ? 'up' : 'down'}`;

                    row.classList.add(isUp ? 'flash-up' : 'flash-down');
                    setTimeout(() => row.classList.remove('flash-up', 'flash-down'), 800);
                }
            }

            // עדכון מט"ח
            const fRes = await fetch('https://open.er-api.com/v6/latest/USD');
            const fData = await fRes.json();
            currentRate = fData.rates.ILS;
            document.getElementById('usd-ils').innerText = `₪${currentRate.toFixed(3)}`;

            document.getElementById('last-update').innerText = `עדכון אחרון: ${new Date().toLocaleTimeString('he-IL')}`;
        } catch (e) { console.error(e); }
        setTimeout(() => icon.classList.remove('spinning'), 600);
    }

    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>
</body>
</html>
